# project.yml - XcodeGen 配置
name: TrackSplitter
options:
  bundleIdPrefix: com.tracksplitter
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  TrackSplitter:
    type: application
    platform: macOS
    sources:
      - path: App
        type: group
        excludes:
          - "TrackSplitter.iconset"
          - "*.iconset"
      - path: Views
        type: group
      - path: ViewModels
        type: group
      - path: Models
        type: group
      - path: ../Library
        type: group
        name: TrackSplitterLib
    preBuildScripts:
      - name: Inject version from Library/Version.swift
        script: |
          "${PROJECT_DIR}/../Scripts/inject_version.sh"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Copy embed_metadata.py
        script: |
          cp "${PROJECT_DIR}/../Resources/embed_metadata.py" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tracksplitter.gui
        PRODUCT_NAME: TrackSplitter
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        SKIP_INSTALL: NO
        INSTALL_PATH: "/Applications"
        GENERATE_INFOPLIST_FILE: NO
